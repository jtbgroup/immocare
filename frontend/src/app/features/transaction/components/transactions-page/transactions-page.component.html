<div class="transactions-page">
  <div class="page-header">
    <h1>Financial Transactions</h1>
  </div>

  <nav class="tab-nav">
    <button
      *ngFor="let tab of tabs"
      class="btn btn-sm"
      [class.btn-primary]="activeTab === tab.id"
      [class.btn-secondary]="activeTab !== tab.id"
      (click)="selectTab(tab.id)">
      {{ tab.label }}
    </button>
  </nav>

  <div class="tab-content">
    <app-transaction-list       *ngIf="activeTab === 'list'" />
    <app-transaction-import     *ngIf="activeTab === 'import'" />
    <app-transaction-dashboard  *ngIf="activeTab === 'dashboard'" />
    <app-transaction-categories *ngIf="activeTab === 'categories'" />
  </div>
</div>
