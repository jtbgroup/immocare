worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        # ── API → Spring Boot (port 8081 dans le même conteneur) ──────────
        location /api/ {
            proxy_pass         http://127.0.0.1:8081;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Port  $server_port;
            proxy_set_header   Connection        "";

            # Indispensable pour que les cookies de session traversent le proxy
            proxy_pass_header  Set-Cookie;

            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_buffering         off;
            proxy_request_buffering off;
        }

        # ── Angular dev server → ng serve (port 4200 dans le même conteneur) ──
        location / {
            proxy_pass         http://127.0.0.1:4200;
            proxy_http_version 1.1;

            # WebSocket requis pour le live-reload Angular HMR
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;

            proxy_read_timeout 86400s;
        }
    }
}