name: immocare-dev

services:
  # ── Application DEV (nginx + Spring Boot + Angular ng serve) ──────────────
  # nginx:8080  →  /api/ → Spring Boot:8081
  #             →  /     → Angular ng serve:4200
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: immocare-dev
    environment:
      SPRING_PROFILES_ACTIVE: ${DB_PROFILE:-postgres}
      SERVER_PORT: 8081
      MAVEN_OPTS: "-Xmx512m"
      NODE_ENV: development
    
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-immocare}
      DB_USER: ${DB_USER:-immocare}
      DB_PASSWORD: ${DB_PASSWORD:-immocare}
    ports:
      - "8080:8080"   # nginx → point d'entrée principal
      - "4200:4200"   # Angular dev server (accès direct)
      - "8081:8081"   # Spring Boot (accès direct)
      - "5005:5005"   # Remote debug JDWP
  
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - maven_cache:/root/.m2
      - node_modules:/app/frontend/node_modules

    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - immocare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s


  postgres:
    image: postgres:16-alpine
    container_name: immocare-postgres-dev
    environment:
      POSTGRES_DB: ${DB_NAME:-immocare}
      POSTGRES_USER: ${DB_USER:-immocare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-immocare}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-immocare}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immocare-network


volumes:
  maven_cache:
    driver: local
  node_modules:
    driver: local
 
  postgres_data_dev:
    driver: local

networks:
  immocare-network:
    driver: bridge