name: Release

on:
  push:
    branches:
      - main
      - develop

jobs:
  # ── Detect release intent from commit message ─────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_snapshot: ${{ steps.parse.outputs.is_snapshot }}
      should_run: ${{ steps.parse.outputs.should_run }}

    steps:
      - name: Parse commit message
        id: parse
        env:
          MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Extract version from "release: x.y.z" or "release: x.y.z-SNAPSHOT"
          if [[ "${MSG}" =~ ^release:\ ([0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT)?)([[:space:]]|$) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            if [[ "${VERSION}" == *-SNAPSHOT ]]; then
              IS_SNAPSHOT=true
            else
              IS_SNAPSHOT=false
            fi
            echo "is_snapshot=${IS_SNAPSHOT}" >> "$GITHUB_OUTPUT"

            # SNAPSHOT allowed on both branches, release only on main
            if [[ "${IS_SNAPSHOT}" == "true" ]] || [[ "${BRANCH}" == "main" ]]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "Release tags are only processed on main — ignoring."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No release intent detected in commit message."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Shared: version bump + tests ──────────────────────────────────────────
  prepare:
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      is_snapshot: ${{ needs.detect.outputs.is_snapshot }}
      version: ${{ needs.detect.outputs.version }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ─────────────────────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Bump backend version
        working-directory: backend
        run: mvn -B versions:set -DnewVersion=${{ needs.detect.outputs.version }} -DgenerateBackupPoms=false

      - name: Run backend tests
        working-directory: backend
        run: mvn -B verify

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bump frontend version
        working-directory: frontend
        run: npm version ${{ needs.detect.outputs.version }} --no-git-tag-version

      - name: Inject appVersion into environment files
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          sed -i "s/appVersion: '[^']*'/appVersion: '${VERSION}'/" \
            frontend/src/environments/environment.ts \
            frontend/src/environments/environment.prod.ts

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --force

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      # ── Commit bumped files + create tag on bumped commit ────────────────
      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/pom.xml frontend/package.json \
                  frontend/src/environments/environment.ts \
                  frontend/src/environments/environment.prod.ts
          git commit -m "chore: bump version to ${{ needs.detect.outputs.version }} [skip ci]"
          git push origin ${{ github.ref_name }}

      - name: Create and push tag
        run: |
          git tag "v${{ needs.detect.outputs.version }}"
          git push origin "v${{ needs.detect.outputs.version }}"

      # ── Release tags only: fast-forward main ─────────────────────────────
      - name: Merge to main
        if: needs.detect.outputs.is_snapshot == 'false' && github.ref_name != 'main'
        run: |
          git fetch origin main
          git checkout main
          git merge --ff-only HEAD@{1} \
            || git merge --no-ff \
                 -m "chore: merge v${{ needs.detect.outputs.version }} into main [skip ci]" \
                 HEAD@{1}
          git push origin main

  # ── Release only: Docker build + GHCR + GitHub Release ───────────────────
  publish:
    needs: prepare
    if: needs.prepare.outputs.is_snapshot == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: v${{ needs.prepare.outputs.version }}
