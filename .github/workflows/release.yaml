name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*-SNAPSHOT"

jobs:
  # ── Shared: version bump + tests ──────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.value }}
      is_snapshot: ${{ steps.version.outputs.is_snapshot }}

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Backend ─────────────────────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Bump backend version
        working-directory: backend
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.value }} -DgenerateBackupPoms=false

      - name: Run backend tests
        working-directory: backend
        run: mvn -B verify

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bump frontend version
        working-directory: frontend
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version

      - name: Inject appVersion into environment files
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          sed -i "s/appVersion: '[^']*'/appVersion: '${VERSION}'/" \
            frontend/src/environments/environment.ts \
            frontend/src/environments/environment.prod.ts

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --force

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      # ── Commit bumped files ──────────────────────────────────────────────
      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/pom.xml frontend/package.json \
                  frontend/src/environments/environment.ts \
                  frontend/src/environments/environment.prod.ts
          git commit -m "chore: bump version to ${{ steps.version.outputs.value }} [skip ci]"

      - name: Push to source branch
        run: |
          SOURCE_BRANCH=$(git branch -r --contains "${{ github.sha }}" \
            | grep -v HEAD \
            | sed 's|origin/||' \
            | head -n1 \
            | tr -d ' ')
          echo "Pushing version bump to ${SOURCE_BRANCH}"
          git push origin HEAD:"${SOURCE_BRANCH}"

      # ── Move tag to bumped commit ────────────────────────────────────────
      - name: Move tag to bumped commit
        run: |
          git tag -f "${{ github.ref_name }}"
          git push origin -f "refs/tags/${{ github.ref_name }}"

      # ── Release tags only: fast-forward main ─────────────────────────────
      - name: Merge to main
        if: steps.version.outputs.is_snapshot == 'false'
        run: |
          git fetch origin main
          git checkout main
          git merge --ff-only HEAD@{1} \
            || git merge --no-ff \
                 -m "chore: merge ${{ github.ref_name }} into main [skip ci]" \
                 HEAD@{1}
          git push origin main

  # ── Release only: Docker build + GHCR + GitHub Release ───────────────────
  publish:
    needs: prepare
    if: needs.prepare.outputs.is_snapshot == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
