# ============================================================
# ImmoCare — Configuration de base
# Profil actif par défaut : postgres
# ============================================================

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres}

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:immocare}}
    username: ${DB_USERNAME:immocare}
    password: ${DB_PASSWORD:immocare}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  session:
    store-type: none

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
  info:
    build:
      enabled: true
    env:
      enabled: true

logging:
  level:
    com.immocare: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
