# ============================================================
# PostgreSQL Profile — dev avec PostgreSQL local ou conteneur
# Usage : SPRING_PROFILES_ACTIVE=postgres
# ============================================================

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:immocare}}
    username: ${DB_USERNAME:immocare}
    password: ${DB_PASSWORD:immocare}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.immocare: DEBUG
    org.hibernate.SQL: DEBUG
