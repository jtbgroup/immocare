# ============================================================
# ImmoCare — Configuration de base
# Profil actif par défaut : h2 (développement local)
# Pour PostgreSQL : -Dspring.profiles.active=postgres
#                   ou SPRING_PROFILES_ACTIVE=postgres
# ============================================================

# Active h2 par défaut (override via variable d'environnement ou profil)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Server
server.port=${SERVER_PORT:8080}

# ── Base (override par le profil actif) ──────────────────────────────────────

# Database (valeurs par défaut PostgreSQL — overridées par le profil h2)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:immocare}
spring.datasource.username=${DB_USER:immocare}
spring.datasource.password=${DB_PASSWORD:immocare}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.com.immocare=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS (développement)
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.info.build.enabled=true
management.info.env.enabled=true

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict