# ============================================================
# H2 Profile — développement local (sans Docker, sans PostgreSQL)
# Usage : -Dspring.profiles.active=h2
#         ou SPRING_PROFILES_ACTIVE=h2
# ============================================================

# H2 in-file database (persiste entre les redémarrages)
spring.datasource.url=jdbc:h2:file:./data/immocare;AUTO_SERVER=TRUE;NON_KEYWORDS=VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — Hibernate crée/met à jour le schéma automatiquement
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway désactivé (les migrations sont PostgreSQL-spécifiques)
spring.flyway.enabled=false

# Script d'initialisation (séquences, données de base)
# Exécuté après la création du schéma par Hibernate
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/h2/init-h2.sql

# Console H2 (accès via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Logging
logging.level.com.immocare=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE