# ============================================================
# Production Profile — uniquement PostgreSQL + Flyway
# Activé par SPRING_PROFILES_ACTIVE=production dans le conteneur Docker
# ============================================================

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:immocare}
spring.datasource.username=${DB_USER:immocare}
spring.datasource.password=${DB_PASSWORD:immocare}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Réduire la verbosité SQL en prod
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.immocare=INFO