# ============================================================
# Production Profile — PostgreSQL + Flyway
# Activé par SPRING_PROFILES_ACTIVE=production dans Docker
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:immocare}
    username: ${DB_USERNAME:immocare}
    password: ${DB_PASSWORD:immocare}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.immocare: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
