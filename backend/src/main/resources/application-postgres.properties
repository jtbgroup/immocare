# ============================================================
# PostgreSQL Profile — dev avec PostgreSQL local ou conteneur
# Usage : -Dspring.profiles.active=postgres
#         ou SPRING_PROFILES_ACTIVE=postgres
# ============================================================

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:immocare}
spring.datasource.username=${DB_USER:immocare}
spring.datasource.password=${DB_PASSWORD:immocare}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.com.immocare=DEBUG
logging.level.org.hibernate.SQL=DEBUG