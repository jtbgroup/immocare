name: immocare

services:
  # ── Application (Angular + Spring Boot + Nginx) ───────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: immocare-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${DB_PROFILE:-postgres}
      SERVER_PORT: 8080
      # PostgreSQL (utilisé si SPRING_PROFILES_ACTIVE=postgres)
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-immocare}
      DB_USER: ${DB_USER:-immocare}
      DB_PASSWORD: ${DB_PASSWORD:-immocare}
      JAVA_OPTS: "-Xmx1024m -Xms512m"
    volumes:
      - app_logs:/var/log/nginx
    ports:
      - "8090:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - immocare-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── PostgreSQL (optionnel — activé avec --profile postgres) ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: immocare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-immocare}
      POSTGRES_USER: ${DB_USER:-immocare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-immocare}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-immocare}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immocare-network


volumes:

  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  immocare-network:
    driver: bridge